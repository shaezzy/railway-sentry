# While a lot of configuration in Sentry can be changed via the UI, for all
# new-style config (as of 8.0) you can also declare values here in this file
# to enforce defaults or to ensure they cannot be changed via the UI. For more
# information see the Sentry documentation.

###############
# Mail Server #
###############

# mail.backend: 'smtp'  # Use dummy if you want to disable email entirely
mail.host: 'smtp'
# mail.port: 25
# mail.username: ''
# mail.password: ''
# NOTE: `mail.use-tls` and `mail.use-ssl` are mutually exclusive and should not
#        appear at the same time. Only uncomment one of them.
# mail.use-tls: false
# mail.use-ssl: false

# NOTE: The following 2 configs (mail.from and mail.list-namespace) are set
#       through SENTRY_MAIL_HOST in sentry.conf.py so remove those first if
#       you want your values in this file to be effective!

# The email address to send on behalf of
# mail.from: 'root@localhost' or ...
# mail.from: 'System Administrator <root@localhost>'

# The mailing list namespace for emails sent by this Sentry server.
# This should be a domain you own (often the same domain as the domain
# part of the `mail.from` configuration parameter value) or `localhost`.
# mail.list-namespace: 'localhost'

# If you'd like to configure email replies, enable this.
# mail.enable-replies: true

# When email-replies are enabled, this value is used in the Reply-To header
# mail.reply-hostname: ''

# If you're using mailgun for inbound mail, set your API key and configure a
# route to forward to /api/hooks/mailgun/inbound/
# Also don't forget to set `mail.enable-replies: true` above.
# mail.mailgun-api-key: ''

###################
# System Settings #
###################

# This is the main URL prefix where Sentry can be accessed.
# On Railway, set SENTRY_SYSTEM_URL_PREFIX env var to your public domain,
# e.g. https://web-production-xxxx.up.railway.app
# system.url-prefix is overridden in sentry.conf.py from SENTRY_SYSTEM_URL_PREFIX env var.
system.url-prefix: 'http://localhost:9000'

# Internal URL used by containers to reach the Sentry web service.
# On Railway, web service is reachable at web.railway.internal:9000
system.internal-url-prefix: 'http://web.railway.internal:9000'

# The secret key must be set via SENTRY_SYSTEM_SECRET_KEY env var.
# This placeholder is overridden in sentry.conf.py.
system.secret-key: '!!changeme!!'

# The ``redis.clusters`` setting is used, unsurprisingly, to configure Redis
# clusters. These clusters can be then referred to by name when configuring
# backends such as the cache, digests, or TSDB backend.
# redis.clusters:
#   default:
#     hosts:
#       0:
#         host: 127.0.0.1
#         port: 6379

################
# File storage #
################

# Uploaded media uses these `filestore` settings. The available
# backends are either `filesystem` or `s3`.

filestore.backend: 'filesystem'
filestore.options:
  location: '/data/files'
dsym.cache-path: '/data/dsym-cache'
releasefile.cache-path: '/data/releasefile-cache'

# filestore.backend: 's3'
# filestore.options:
#   access_key: 'AKIXXXXXX'
#   secret_key: 'XXXXXXX'
#   bucket_name: 's3-bucket-name'

# Profiles are stored in SeaweedFS (S3-compatible).
# On Railway, seaweedfs is reachable at seaweedfs.railway.internal:8333
filestore.profiles-backend: 's3'
filestore.profiles-options:
  bucket_acl: "private"
  default_acl: "private"
  access_key: "sentry"
  secret_key: "sentry"
  bucket_name: "profiles"
  region_name: "us-east-1"
  endpoint_url: "http://seaweedfs.railway.internal:8333"
  addressing_style: "path"
  signature_version: "s3v4"

symbolicator.enabled: true
symbolicator.options:
  url: "http://symbolicator.railway.internal:3021"

transaction-events.force-disable-internal-project: true

